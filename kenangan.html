<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kenangan — Memory Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0e0d; --bg2:#1a1814; --bg3:#242220; --bg4:#2c2a27;
  --card:#1e1c1a; --bd:rgba(255,255,255,.07); --bdh:rgba(255,255,255,.15);
  --t:#e8e4dc; --t2:#9e9a92; --t3:#666260;
  --A:#c4956a; --Ad:rgba(196,149,106,.18); --Ab:rgba(196,149,106,.3);
  --G:#8fb89a; --Gd:rgba(143,184,154,.15); --Gb:rgba(143,184,154,.28);
  --B:#7a9db8; --Bd:rgba(122,157,184,.15); --Bb:rgba(122,157,184,.28);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--t);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:1000;opacity:.55;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.05'/%3E%3C/svg%3E");}

/* ═══ HEADER & TOOLBAR ═══ */
header{padding:2.6rem 2.5rem 1.8rem;border-bottom:1px solid var(--bd);}
.hd{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:2rem;flex-wrap:wrap;}
.logo{display:flex;flex-direction:column;gap:.18rem;line-height:1;user-select:none;}
.logo-line1{font-family:'Lora',serif;font-size:clamp(1.55rem,3.2vw,2.2rem);font-weight:400;letter-spacing:.01em;color:var(--t);line-height:1;}
.logo-line1 em{font-style:italic;color:var(--A);font-weight:400;}
.logo-line2{font-family:'DM Sans',sans-serif;font-size:clamp(.58rem,.85vw,.7rem);font-weight:300;letter-spacing:.3em;text-transform:uppercase;color:var(--t3);padding-left:.06em;}
.logo-rule{width:100%;height:1px;background:linear-gradient(to right,var(--Ab),transparent);margin-top:.2rem;}
.stats{display:flex;gap:1.8rem;font-size:.77rem;color:var(--t3);letter-spacing:.05em;}
.stats b{color:var(--t2);font-weight:500;}

.toolbar{max-width:1400px;margin:0 auto;padding:1.15rem 2.5rem;display:flex;align-items:center;gap:.8rem;flex-wrap:wrap;}
.fgrp{display:flex;gap:.35rem;}
.fbtn{background:transparent;border:1px solid var(--bd);color:var(--t3);font-family:'DM Sans',sans-serif;font-size:.73rem;letter-spacing:.08em;text-transform:uppercase;padding:.38rem .85rem;border-radius:100px;cursor:pointer;transition:all .18s;}
.fbtn:hover{border-color:var(--bdh);color:var(--t2);}
.fbtn.on{background:var(--A);border-color:var(--A);color:#1a1410;font-weight:500;}
.sw{margin-left:auto;position:relative;}
.sw input{background:var(--bg2);border:1px solid var(--bd);color:var(--t);font-family:'DM Sans',sans-serif;font-size:.84rem;padding:.48rem 1rem .48rem 2.2rem;border-radius:100px;outline:none;width:200px;transition:border-color .2s,width .28s;}
.sw input:focus{border-color:var(--bdh);width:260px;}
.si{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);opacity:.35;pointer-events:none;font-size:.9rem;}

/* ═══ GRID & CARDS ═══ */
.gw{max-width:1400px;margin:0 auto;padding:.5rem 2.5rem 4rem;}
.grid{columns:4 280px;column-gap:14px;}
@media(max-width:900px){.grid{columns:2 200px;}}
@media(max-width:500px){.grid{columns:1;}}

.card{break-inside:avoid;margin-bottom:14px;border-radius:10px;overflow:hidden;background:var(--card);border:1px solid var(--bd);cursor:pointer;transition:transform .25s,border-color .25s,box-shadow .25s;animation:fu .46s ease both;}
@keyframes fu{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.card:hover{transform:translateY(-3px);border-color:var(--bdh);box-shadow:0 14px 44px rgba(0,0,0,.55);}
.card.aud-card{cursor:default;}

.mw{position:relative;overflow:hidden;background:#0a0908;line-height:0;}

/* Hover Animasi Keren untuk Gambar & Video Preview */
.mw img, .mw video {display:block;width:100%;object-fit:cover;transition:transform .6s ease, filter .6s ease;}
.card:hover .mw img {transform:scale(1.08) rotate(1deg); filter: contrast(1.1) brightness(1.05);}
.card:hover .mw video {transform:scale(1.04);}

/* Badges */
.tbadge{position:absolute;top:.5rem;right:.5rem;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:.2rem .5rem;border-radius:100px;font-weight:500;z-index:2;pointer-events:none;}
.dur-badge{position:absolute;bottom:.5rem;left:.5rem;font-size:.65rem;font-variant-numeric:tabular-nums;background:rgba(0,0,0,.75);color:#fff;padding:.15rem .45rem;border-radius:6px;font-weight:500;letter-spacing:.05em;z-index:2;pointer-events:none;backdrop-filter:blur(4px);}
.bi{background:var(--Ad);color:var(--A);border:1px solid var(--Ab);}
.bv{background:var(--Bd);color:var(--B);border:1px solid var(--Bb);}
.ba{background:var(--Gd);color:var(--G);border:1px solid var(--Gb);}

/* Card Info Info */
.ci{padding:.78rem 1rem .95rem;border-top:1px solid var(--bd);line-height:1.4;}
.ct{font-family:'Lora',serif;font-size:.88rem;font-weight:600;color:var(--t);line-height:1.3;margin-bottom:.28rem;}
.cc{font-size:.74rem;color:var(--t3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:.52rem;}
.cm{display:flex;align-items:center;justify-content:space-between;gap:.4rem;}
.cd{font-size:.68rem;color:var(--t3);}
.tags{display:flex;gap:.22rem;flex-wrap:wrap;justify-content:flex-end;}
.tag{font-size:.6rem;letter-spacing:.04em;color:var(--t3);background:var(--bg3);border:1px solid var(--bd);padding:.1rem .42rem;border-radius:100px;}
.empty{text-align:center;padding:5rem 2rem;color:var(--t3);font-family:'Lora',serif;font-style:italic;font-size:1.05rem;}

/* ═══════════════════════════════════════════
   CUSTOM AUDIO PLAYER (GRID)
═══════════════════════════════════════════ */
.ap{
  aspect-ratio:1/1;
  background-size:cover; 
  background-position:center;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:1.4rem 1.25rem 1rem;gap:0;
  position:relative;overflow:hidden;
}
.ap::after{content:'';position:absolute;inset:0;background:rgba(8,7,6,.6);z-index:0;pointer-events:none;}

.ap-waves{
  position:absolute;bottom:0;left:0;right:0;height:45%;
  display:flex;align-items:flex-end;gap:2px;padding:0 6px;
  opacity:0;transition:opacity .4s;pointer-events:none;z-index:1;
}
.ap.playing .ap-waves{opacity:.25;}
.ap-waves span{
  flex:1;border-radius:1px 1px 0 0;background:var(--G);
  transform:scaleY(.28);transform-origin:bottom;
  transition:transform .4s ease;
}
.ap.playing .ap-waves span{animation:wv 1.35s ease-in-out infinite both;}
.ap-waves span:nth-child(2n){animation-delay:.18s;}
.ap-waves span:nth-child(3n){animation-delay:.36s;}
.ap-waves span:nth-child(5n){animation-delay:.08s;}
.ap-waves span:nth-child(7n){animation-delay:.52s;}
@keyframes wv{0%,100%{transform:scaleY(.28);}50%{transform:scaleY(1);}}

/* Piringan Hitam Audio */
.ap-disc{
  width:80px;height:80px;border-radius:50%;
  background:conic-gradient(from 0deg,#1c2a20,#253322,#1c2a20,#1f2e23,#1c2a20);
  border:1.5px solid rgba(143,184,154,.22);
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:2;margin-bottom:.5rem;
  flex-shrink:0; cursor:pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.ap-disc:hover{box-shadow: 0 0 15px rgba(143,184,154,.3); transform:scale(1.05);}
.ap-disc::after{content:'';width:15px;height:15px;border-radius:50%;background:var(--bg3);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border:1px solid rgba(143,184,154,.18);}
.ap-disc svg{width:24px;height:24px;fill:rgba(143,184,154,.65);}

/* Animasi Putar Disc saat Audio Main ATAU Card di-Hover */
.card.aud-card:hover .ap-disc, .ap.playing .ap-disc {animation:spin 5s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ═══════════════════════════════════════════
   VIDEO PLAYER CONTROLS (HANYA UNTUK LIGHTBOX)
═══════════════════════════════════════════ */
.vp{position:relative;background:#000;overflow:hidden;line-height:0;width:100%;}
.vp video{display:block;width:100%;max-height:64vh;object-fit:contain;}
.vp-ctrl{
  position:absolute;bottom:0;left:0;right:0;z-index:4;
  padding:.55rem .7rem .6rem;
  background:linear-gradient(to top,rgba(8,7,6,.96) 0%,rgba(8,7,6,.45) 65%,transparent 100%);
  display:flex;flex-direction:column;gap:.4rem;
  opacity:0;transform:translateY(3px);transition:opacity .22s,transform .22s;
}
.vp.active .vp-ctrl,.vp.active:hover .vp-ctrl{opacity:1;transform:translateY(0);}

.scrub{position:relative;height:3px;cursor:pointer;border-radius:2px;background:rgba(255,255,255,.1);}
.scrub-buf{position:absolute;inset-block:0;left:0;border-radius:2px;background:rgba(255,255,255,.14);pointer-events:none;}
.scrub-fill{position:absolute;inset-block:0;left:0;border-radius:2px;background:var(--A);pointer-events:none;width:0%;}
.scrub-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:11px;height:11px;border-radius:50%;background:var(--A);pointer-events:none;opacity:0;transition:opacity .12s;left:0%;}
.scrub:hover .scrub-thumb{opacity:1;}

.vp-row{display:flex;align-items:center;gap:.5rem;}
.vc{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.75);display:flex;align-items:center;justify-content:center;padding:.05rem;transition:color .12s;flex-shrink:0;line-height:1;}
.vc:hover{color:#fff;}
.vc svg{width:15px;height:15px;fill:currentColor;display:block;}
.vtime{font-size:.66rem;color:rgba(255,255,255,.5);font-variant-numeric:tabular-nums;letter-spacing:.02em;white-space:nowrap;}
.vol-g{display:flex;align-items:center;gap:.35rem;margin-left:auto;}
.vol-bar{width:48px;height:3px;background:rgba(255,255,255,.14);border-radius:2px;cursor:pointer;position:relative;flex-shrink:0;}
.vol-fill{height:100%;border-radius:2px;background:rgba(255,255,255,.45);pointer-events:none;width:100%;}

/* ═══ LIGHTBOX ═══ */
.lb{display:none;position:fixed;inset:0;background:rgba(7,6,5,.95);z-index:999;align-items:center;justify-content:center;padding:2rem;backdrop-filter:blur(10px);}
.lb.open{display:flex;}
.lb-in{max-width:900px;width:100%;max-height:90vh;display:flex;flex-direction:column;gap:1.2rem;position:relative;}
.lb-x{position:absolute;top:-2.6rem;right:0;background:none;border:1px solid var(--bd);color:var(--t2);font-size:1rem;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.lb-x:hover{border-color:var(--bdh);color:var(--t);}
.lb-med{border-radius:8px;overflow:hidden;display:flex;justify-content:center;background:#0a0908;}
.lb-med img{max-width:100%;max-height:64vh;object-fit:contain;display:block;}
.lb-h{font-family:'Lora',serif;font-size:1.3rem;font-weight:600;margin-bottom:.35rem;}
.lb-c{font-size:.86rem;color:var(--t2);line-height:1.6;}
.lb-m{display:flex;align-items:center;gap:1rem;margin-top:.65rem;}
.lb-d{font-size:.74rem;color:var(--t3);}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bdh);border-radius:3px;}
</style>
</head>
<body>

<header>
  <div class="hd">
    <div class="logo">
      <div class="logo-line1">Still <em>Here</em></div>
      <div class="logo-rule"></div>
      <div class="logo-line2">a personal archive</div>
    </div>
    <div class="stats">
      <span><b id="sT">0</b> kenangan</span>
      <span><b id="sI">0</b> foto</span>
      <span><b id="sV">0</b> video</span>
      <span><b id="sA">0</b> audio</span>
    </div>
  </div>
</header>

<div class="toolbar">
  <div class="fgrp" id="fg">
    <button class="fbtn on" data-f="all">Semua</button>
    <button class="fbtn" data-f="image">Foto</button>
    <button class="fbtn" data-f="video">Video</button>
    <button class="fbtn" data-f="audio">Audio</button>
  </div>
  <div class="sw">
    <span class="si">⌕</span>
    <input type="text" id="si" placeholder="Cari kenangan…">
  </div>
</div>

<div class="gw">
  <div class="grid" id="grid"></div>
  <div class="empty" id="emp" style="display:none">Belum ada kenangan di sini…</div>
</div>

<div class="lb" id="lb">
  <div class="lb-in">
    <button class="lb-x" id="lbX">✕</button>
    <div class="lb-med" id="lbMed"></div>
    <div>
      <div class="lb-h" id="lbH"></div>
      <div class="lb-c" id="lbC"></div>
      <div class="lb-m"><span class="lb-d" id="lbD"></span><div class="tags" id="lbTg"></div></div>
    </div>
  </div>
</div>

<script>
// ── ICONS ──
const IC = {
  play:  `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`,
  pause: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>`,
  vol:   `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0014 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>`,
  mute:  `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 12A4.5 4.5 0 0014 7.97v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0021 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06A8.99 8.99 0 0017 18.27l2.72 2.73L21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>`,
  fs:    `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>`,
  note:  `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55A4 4 0 1014 17V7h4V3h-6z"/></svg>`,
};

let memories=[], F='all', Q='';

// ── DATA FETCH ──
async function load(){
  try {
    const response = await fetch('tmp/memories.json');
    if (!response.ok) throw new Error('Gagal ambil data');
    const data = await response.json();
    memories = data.memories || []; 
    render();
  } catch (err) {
    document.getElementById('emp').style.display = 'block';
    document.getElementById('emp').textContent = 'Gagal memuat data kenangan...';
  }
}

// ── UTILS ──
function fd(s){ if(!s)return''; return new Date(s).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'}); }
function ft(s){ if(isNaN(s)||!s)return'0:00'; const m=Math.floor(s/60),sec=Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }

function ph(type, idSeed=''){
  const c=document.createElement('canvas'); const x=c.getContext('2d');
  c.width=400; 
  if(type==='video') c.height=240;
  else if(type==='audio') c.height=400;
  else c.height=[300,360,260][0|Math.random()*3]; 

  const col={image:['#251908','#c4956a'],video:['#0d1921','#7a9db8'],audio:['#1c2a20','#8fb89a']};
  const[bg,fg]=col[type]||col.image;
  x.fillStyle=bg; x.fillRect(0,0,c.width,c.height);

  if(type==='audio'){
    const seed = idSeed.length ? idSeed.charCodeAt(idSeed.length-1) : 0;
    x.globalAlpha = 0.05; x.fillStyle = fg;
    for(let i=0; i<8; i++){
      x.beginPath(); x.arc(c.width/2, c.height/2, (20 + i*35 + (seed % 10)) , 0, Math.PI*2);
      x.lineWidth = 2; x.strokeStyle = fg; x.stroke();
    }
  } else {
    for(let i=0;i<5;i++){
      x.beginPath(); x.arc(Math.random()*c.width,Math.random()*c.height,20+Math.random()*80,0,Math.PI*2);
      x.fillStyle='rgba(255,255,255,.022)'; x.fill();
    }
  }

  x.globalAlpha=0.08; x.fillStyle=fg;
  x.font=`bold ${Math.min(c.width,c.height)*.3}px serif`; x.textAlign='center'; x.textBaseline='middle';
  x.fillText(type==='video'?'▶':(type==='audio'?'💿':'◆'), c.width/2, c.height/2);
  
  x.globalAlpha=1; return c.toDataURL();
}

// ══════════════════════════════════════════
//  VIDEO: GRID PREVIEW VS LIGHTBOX FULL
// ══════════════════════════════════════════
function mkVid(src, lb=false){
  // JIKA GRID: Mode Cuplikan YouTube (Mute, Loop on Hover)
  if(!lb) {
    const wrap = document.createElement('div'); wrap.className = 'mw';
    
    const vid = document.createElement('video');
    vid.preload = 'metadata'; vid.muted = true; vid.loop = true; vid.playsInline = true;
    if(src) vid.src = src;

    const dur = document.createElement('span'); dur.className = 'dur-badge';
    if(vid.readyState >= 1) dur.textContent = ft(vid.duration);
    vid.addEventListener('loadedmetadata', () => dur.textContent = ft(vid.duration));

    const bdg = document.createElement('span'); bdg.className = 'tbadge bv'; bdg.textContent = 'Video';

    // Hover mutar video
    wrap.addEventListener('mouseenter', () => vid.play().catch(()=>{}));
    wrap.addEventListener('mouseleave', () => { vid.pause(); vid.currentTime = 0; });

    wrap.append(vid, dur, bdg);
    return wrap;
  }

  // JIKA LIGHTBOX: Full Player dengan UI
  const wrap = document.createElement('div'); wrap.className = 'vp active';
  const vid = document.createElement('video');
  vid.preload = 'metadata'; vid.playsInline = true; if(src) vid.src = src;
  wrap.appendChild(vid);

  const ctrl = document.createElement('div'); ctrl.className = 'vp-ctrl';
  const sw = document.createElement('div'); sw.className = 'scrub';
  const sbuf = document.createElement('div'); sbuf.className = 'scrub-buf';
  const sf = document.createElement('div'); sf.className = 'scrub-fill';
  const st = document.createElement('div'); st.className = 'scrub-thumb';
  sw.append(sbuf,sf,st); ctrl.appendChild(sw);

  const row = document.createElement('div'); row.className = 'vp-row';
  const bPlay = document.createElement('button'); bPlay.className = 'vc'; bPlay.innerHTML = IC.pause;
  const tEl = document.createElement('span'); tEl.className = 'vtime'; tEl.textContent = '0:00 / 0:00';
  const vg = document.createElement('div'); vg.className = 'vol-g';
  const bVol = document.createElement('button'); bVol.className = 'vc'; bVol.innerHTML = IC.vol;
  const vb = document.createElement('div'); vb.className = 'vol-bar';
  const vf = document.createElement('div'); vf.className = 'vol-fill'; vf.style.width='100%';
  vb.appendChild(vf); vg.append(bVol,vb);
  const bFs = document.createElement('button'); bFs.className = 'vc'; bFs.innerHTML = IC.fs;
  row.append(bPlay,tEl,vg,bFs); ctrl.appendChild(row);
  wrap.appendChild(ctrl);

  let muted = false;
  function togglePlay(){
    if(vid.paused){ vid.play(); bPlay.innerHTML = IC.pause; }
    else{ vid.pause(); bPlay.innerHTML = IC.play; }
  }
  bPlay.addEventListener('click', togglePlay);
  wrap.addEventListener('click', (e) => { if(!e.target.closest('.vp-ctrl')) togglePlay(); });

  vid.addEventListener('timeupdate',()=>{
    if(!vid.duration) return;
    const p = vid.currentTime/vid.duration*100;
    sf.style.width = p+'%'; st.style.left = p+'%';
    tEl.textContent = ft(vid.currentTime)+' / '+ft(vid.duration);
    sbuf.style.width = vid.buffered.length?(vid.buffered.end(vid.buffered.length-1)/vid.duration*100)+'%':'0%';
  });
  vid.addEventListener('ended',()=>{ bPlay.innerHTML=IC.play; sf.style.width='0%'; st.style.left='0%'; });
  sw.addEventListener('click',e=>{ const r=sw.getBoundingClientRect(); const p=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)); if(vid.duration)vid.currentTime=p*vid.duration; });
  bVol.addEventListener('click',()=>{ muted=!muted;vid.muted=muted; bVol.innerHTML=muted?IC.mute:IC.vol; vf.style.width=muted?'0%':(vid.volume*100)+'%'; });
  vb.addEventListener('click',e=>{ const r=vb.getBoundingClientRect(); const v=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)); vid.volume=v;vf.style.width=(v*100)+'%'; muted=v===0;vid.muted=muted; bVol.innerHTML=muted?IC.mute:IC.vol; });
  bFs.addEventListener('click',()=>{ if(wrap.requestFullscreen)wrap.requestFullscreen(); });

  setTimeout(()=> vid.play().catch(()=>{ bPlay.innerHTML=IC.play; }), 100);
  return wrap;
}

// ══════════════════════════════════════════
//  BUILD AUDIO PLAYER (CLEAN GRID)
// ══════════════════════════════════════════
function mkAud(src, idSeed=''){
  const wrap = document.createElement('div'); wrap.className = 'ap';
  wrap.style.backgroundImage = 'url(' + ph('audio', idSeed) + ')';

  const waves = document.createElement('div'); waves.className = 'ap-waves';
  [18,42,68,30,85,50,25,72,40,90,55,22,78,38,60,32,82,48,28,65].forEach(h=>{
    const s=document.createElement('span'); s.style.height=h+'%'; waves.appendChild(s);
  });

  // Tombol play dihapus, diganti piringan hitam yang bisa diklik
  const disc = document.createElement('div'); disc.className = 'ap-disc'; disc.innerHTML = IC.note;
  const badge = document.createElement('span'); badge.className = 'tbadge ba'; badge.textContent = 'Audio';
  const dur = document.createElement('span'); dur.className = 'dur-badge'; 

  const aud = document.createElement('audio'); aud.preload = 'metadata'; if(src) aud.src = src;

  if(aud.readyState >= 1) dur.textContent = ft(aud.duration);
  aud.addEventListener('loadedmetadata', () => dur.textContent = ft(aud.duration));

  wrap.append(waves, disc, badge, dur, aud);

  // Klik piringan muter lagu
  disc.addEventListener('click', (e)=>{
    e.stopPropagation(); // Biar gak trigger event klik card (kalau ada)
    if(aud.paused){ aud.play(); wrap.classList.add('playing'); }
    else{ aud.pause(); wrap.classList.remove('playing'); }
  });

  aud.addEventListener('ended',()=>{ wrap.classList.remove('playing'); });
  return wrap;
}

// ══════════════════════════════════════════
//  RENDER CARD
// ══════════════════════════════════════════
function mkCard(m,i){
  const card=document.createElement('div');
  card.className='card'+(m.type==='audio'?' aud-card':'');
  card.style.animationDelay=(i*.055)+'s';

  const fileSource = 'tmp/' + m.filename;

  if(m.type==='image'){
    const mw=document.createElement('div'); mw.className='mw';
    const img=document.createElement('img'); img.src=fileSource; img.alt=m.title; img.loading='lazy';
    img.onerror = function() { this.src = ph('image', m.id); };
    const bdg=document.createElement('span'); bdg.className='tbadge bi'; bdg.textContent='Foto';
    mw.append(img,bdg); card.appendChild(mw);
    card.addEventListener('click',()=>openLB(m));

  } else if(m.type==='video'){
    // Gunakan mode preview (tanpa ui player)
    const vp = mkVid(fileSource, false);
    card.appendChild(vp);
    // Klik area card membuka lightbox
    card.addEventListener('click',()=>openLB(m));

  } else if(m.type==='audio'){
    card.appendChild(mkAud(fileSource, m.id));
  }

  const info=document.createElement('div'); info.className='ci';
  const tags=(m.tags||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('');
  info.innerHTML=`<div class="ct">${m.title}</div><div class="cc">${m.caption}</div><div class="cm"><span class="cd">${fd(m.date)}</span><div class="tags">${tags}</div></div>`;
  card.appendChild(info);
  return card;
}

// ── RENDER ──
function render(){
  const g=document.getElementById('grid'),e=document.getElementById('emp');
  const l = memories.filter(m=>{
    const mf=F==='all'||m.type===F; const q=Q.toLowerCase();
    return mf && (!q||m.title.toLowerCase().includes(q)||m.caption.toLowerCase().includes(q)||(m.tags||[]).some(t=>t.toLowerCase().includes(q)));
  });
  g.innerHTML=''; e.style.display=l.length?'none':'block';
  l.forEach((m,i)=>g.appendChild(mkCard(m,i)));
  document.getElementById('sT').textContent=memories.length;
  document.getElementById('sI').textContent=memories.filter(m=>m.type==='image').length;
  document.getElementById('sV').textContent=memories.filter(m=>m.type==='video').length;
  document.getElementById('sA').textContent=memories.filter(m=>m.type==='audio').length;
}

// ── FILTERS ──
document.getElementById('fg').addEventListener('click',e=>{
  const b=e.target.closest('.fbtn'); if(!b)return;
  document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); F=b.dataset.f; render();
});
document.getElementById('si').addEventListener('input',e=>{Q=e.target.value;render();});

// ── LIGHTBOX ──
function openLB(m){
  const med=document.getElementById('lbMed'); med.innerHTML='';
  const fileSource = 'tmp/' + m.filename;

  if(m.type==='image'){ 
    const img=document.createElement('img'); img.src=fileSource; img.alt=m.title; med.appendChild(img); 
    img.onerror = function() { this.src = ph('image', m.id); };
  }
  else if(m.type==='video'){ 
    const vp=mkVid(fileSource, true); // True = panggil Full Player UI
    med.appendChild(vp); 
  }
  
  document.getElementById('lbH').textContent=m.title;
  document.getElementById('lbC').textContent=m.caption;
  document.getElementById('lbD').textContent=fd(m.date);
  document.getElementById('lbTg').innerHTML=(m.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
  document.getElementById('lb').classList.add('open');
}
document.getElementById('lbX').addEventListener('click',closeLB);
document.getElementById('lb').addEventListener('click',e=>{ if(e.target===e.currentTarget)closeLB(); });
function closeLB(){ const lb=document.getElementById('lb'); lb.classList.remove('open'); const v=lb.querySelector('video'); if(v)v.pause(); }

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLB();});

// MULAI
load();
</script>
